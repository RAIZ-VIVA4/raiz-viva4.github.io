<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Raiz Viva - Terapia Capilar Botanica</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Italiana&display=swap" rel="stylesheet" />
<style>
/* ==========================================================================
   RAÍZ VIVA — Terapia Capilar Botánica
   Paleta editorial botánica
   ========================================================================== */

:root {
  /* Verdes — tomados directamente del logo y la etiqueta */
  --verde-profundo: #1f2d1a;     /* fondo oscuro, casi musgo */
  --verde-bosque: #2d3b24;       /* verde principal */
  --verde-oliva: #475a38;        /* verde medio */
  --verde-salvia: #8a9978;       /* verde apagado */

  /* Dorados */
  --dorado: #c9a961;             /* dorado logo */
  --dorado-claro: #dfc288;
  --dorado-profundo: #9a7f42;

  /* Cremas / fondos cálidos */
  --crema: #f4efe6;              /* fondo principal claro */
  --crema-profunda: #ebe4d3;     /* crema con más cuerpo */
  --pergamino: #e8dfc9;          /* acento papel viejo */

  /* Neutros */
  --tinta: #22231e;              /* texto principal */
  --tinta-suave: #4a4b43;
  --sombra: rgba(31, 45, 26, 0.12);

  /* Tipografías */
  --serif: "Cormorant Garamond", "Garamond", serif;
  --italiana: "Italiana", "Cormorant Garamond", serif;
  --sans: "Inter", -apple-system, sans-serif;

  --container: 1320px;
  --gap: clamp(20px, 3vw, 40px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--crema);
  color: var(--tinta);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  cursor: default;
}

img { max-width: 100%; display: block; }

/* ====== NAV ====== */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.5s ease;
  mix-blend-mode: normal;
}
.nav.scrolled {
  background: rgba(244, 239, 230, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 40px;
  border-bottom: 1px solid rgba(201, 169, 97, 0.2);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--verde-bosque);
  font-weight: 500;
}
.nav.top .nav-logo { color: var(--crema); }
.nav-logo img { width: 42px; height: 42px; border-radius: 50%; }
.nav-links {
  display: flex;
  gap: 34px;
  list-style: none;
}
.nav-links a {
  font-family: var(--sans);
  font-size: 11.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--tinta);
  text-decoration: none;
  font-weight: 400;
  position: relative;
  padding: 4px 0;
  transition: color 0.3s ease;
}
.nav.top .nav-links a { color: var(--crema); }
.nav-links a::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--dorado);
  transition: width 0.4s ease;
}
.nav-links a:hover::after { width: 100%; }
.nav-links a:hover { color: var(--dorado); }

.nav-wa {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1px solid var(--dorado);
  background: transparent;
  color: var(--dorado);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 2px;
  transition: all 0.35s ease;
  cursor: pointer;
}
.nav-wa:hover {
  background: var(--dorado);
  color: var(--verde-profundo);
}

/* ====== HERO ====== */
.hero {
  position: relative;
  min-height: 100vh;
  background: var(--verde-profundo);
  color: var(--crema);
  overflow: hidden;
  display: flex;
  align-items: center;
}
.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(71, 90, 56, 0.6), transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(201, 169, 97, 0.15), transparent 60%),
    linear-gradient(180deg, #1a251500 0%, #1a2515 100%),
    #1f2d1a;
}
.hero-leaves {
  position: absolute;
  inset: 0;
  opacity: 0.25;
  pointer-events: none;
}
.hero-leaf {
  position: absolute;
  color: var(--verde-salvia);
  will-change: transform;
}
.hero-grain {
  position: absolute;
  inset: 0;
  opacity: 0.08;
  pointer-events: none;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.7'/></svg>");
}

.hero-inner {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 120px 40px 80px;
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 60px;
  align-items: center;
}

.hero-eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--dorado);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.hero-eyebrow::before {
  content: "";
  width: 38px;
  height: 1px;
  background: var(--dorado);
}

.hero-title {
  font-family: var(--italiana);
  font-size: clamp(64px, 9vw, 140px);
  line-height: 0.95;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--crema);
  margin-bottom: 8px;
}
.hero-title em {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  color: var(--dorado);
}

.hero-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 1.8vw, 24px);
  color: var(--crema);
  opacity: 0.85;
  margin: 40px 0 48px;
  max-width: 460px;
  line-height: 1.5;
  font-weight: 300;
}

.hero-cta-row {
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 32px;
  background: var(--dorado);
  color: var(--verde-profundo);
  border: 1px solid var(--dorado);
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  text-decoration: none;
  font-weight: 500;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.4s ease;
  overflow: hidden;
  position: relative;
}
.btn-primary:hover {
  background: transparent;
  color: var(--dorado);
  letter-spacing: 0.32em;
}
.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 32px;
  background: transparent;
  color: var(--crema);
  border: 1px solid rgba(244, 239, 230, 0.35);
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.4s ease;
}
.btn-ghost:hover {
  border-color: var(--dorado);
  color: var(--dorado);
}

/* Hero product visual */
.hero-visual {
  position: relative;
  height: 650px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-circle {
  position: absolute;
  width: 480px;
  height: 480px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 97, 0.3);
  animation: rotate 120s linear infinite;
}
.hero-circle.inner {
  width: 380px;
  height: 380px;
  border-color: rgba(201, 169, 97, 0.15);
  animation-duration: 80s;
  animation-direction: reverse;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.hero-product {
  position: relative;
  width: 440px;
  height: 620px;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  transform: translateY(0);
  will-change: transform;
}
.hero-product img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.hero-badge {
  position: absolute;
  top: 40px;
  right: -30px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--crema);
  color: var(--verde-bosque);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  text-align: center;
  line-height: 1.2;
  padding: 20px;
  z-index: 3;
  transform: rotate(-8deg);
}
.hero-badge strong {
  font-family: var(--italiana);
  font-style: normal;
  font-size: 20px;
  color: var(--dorado);
  display: block;
}

.hero-scroll {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--crema);
  opacity: 0.6;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  z-index: 3;
}
.hero-scroll::after {
  content: "";
  width: 1px;
  height: 40px;
  background: var(--dorado);
  animation: scrollLine 2s ease-in-out infinite;
  transform-origin: top;
}
@keyframes scrollLine {
  0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
  50% { transform: scaleY(1); opacity: 1; }
}

/* Marquee under hero */
.marquee {
  background: var(--verde-bosque);
  color: var(--dorado);
  border-top: 1px solid rgba(201, 169, 97, 0.25);
  border-bottom: 1px solid rgba(201, 169, 97, 0.25);
  padding: 22px 0;
  overflow: hidden;
  position: relative;
}
.marquee-track {
  display: flex;
  gap: 60px;
  animation: marquee 40s linear infinite;
  white-space: nowrap;
  width: max-content;
}
.marquee-item {
  font-family: var(--italiana);
  font-size: 22px;
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 60px;
}
.marquee-item::after {
  content: "✦";
  font-size: 14px;
  color: var(--dorado);
  opacity: 0.6;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ====== SECTION BASE ====== */
section { position: relative; }
.section {
  padding: clamp(80px, 12vw, 160px) 40px;
}
.section-inner {
  max-width: var(--container);
  margin: 0 auto;
}
.section-eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--dorado-profundo);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-eyebrow::before {
  content: "";
  width: 32px;
  height: 1px;
  background: var(--dorado);
}
.section-title {
  font-family: var(--italiana);
  font-size: clamp(44px, 6vw, 88px);
  line-height: 1;
  color: var(--verde-bosque);
  margin-bottom: 32px;
  letter-spacing: -0.01em;
}
.section-title em {
  font-family: var(--serif);
  font-style: italic;
  color: var(--dorado-profundo);
}

/* ====== HISTORIA ====== */
.historia {
  background: var(--crema);
  position: relative;
  overflow: hidden;
}
.historia-grid {
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 80px;
  align-items: center;
}
.historia-img-wrap {
  position: relative;
}
.historia-img {
  aspect-ratio: 3/4;
  background: var(--pergamino);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  background-size: cover;
  background-position: center top;
  filter: saturate(1.05);
  transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}
.historia-img-wrap:hover .historia-img {
  transform: scale(1.02);
}
.historia-img::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(31, 45, 26, 0.25) 100%);
  pointer-events: none;
}
.historia-img-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--verde-oliva);
  text-align: center;
  padding: 20px;
}
.historia-frame {
  position: absolute;
  inset: -14px;
  border: 1px solid var(--dorado);
  border-radius: 4px;
  pointer-events: none;
}
.historia-stamp {
  position: absolute;
  bottom: -30px;
  right: -30px;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: var(--verde-bosque);
  color: var(--dorado);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  text-align: center;
  padding: 24px;
  line-height: 1.3;
}
.historia-stamp strong {
  display: block;
  font-family: var(--italiana);
  font-style: normal;
  font-size: 22px;
  color: var(--dorado-claro);
  margin-bottom: 4px;
}

.historia-text p {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.7;
  color: var(--tinta);
  margin-bottom: 22px;
  font-weight: 400;
}
.historia-text p:first-of-type::first-letter {
  font-family: var(--italiana);
  font-size: 72px;
  line-height: 0.8;
  float: left;
  margin: 6px 12px 0 -2px;
  color: var(--dorado-profundo);
}
.historia-signature {
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.historia-signature-line {
  font-family: var(--italiana);
  font-size: 32px;
  color: var(--verde-bosque);
  letter-spacing: 0.05em;
}
.historia-signature-sub {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--tinta-suave);
  border-left: 1px solid var(--dorado);
  padding-left: 16px;
}

/* ====== FILOSOFIA ====== */
.filosofia {
  background: var(--verde-profundo);
  color: var(--crema);
  position: relative;
  overflow: hidden;
}
.filosofia::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 20%, rgba(201, 169, 97, 0.08), transparent 60%);
  pointer-events: none;
}
.filosofia .section-title { color: var(--crema); }
.filosofia .section-title em { color: var(--dorado); }
.filosofia .section-eyebrow { color: var(--dorado); }
.filosofia-intro {
  max-width: 640px;
  margin-bottom: 80px;
}
.filosofia-intro p {
  font-family: var(--serif);
  font-style: italic;
  font-size: 22px;
  line-height: 1.6;
  color: var(--crema);
  opacity: 0.9;
  font-weight: 300;
}

.pillars {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid rgba(201, 169, 97, 0.25);
}
.pillar {
  padding: 48px 32px 48px 0;
  border-right: 1px solid rgba(201, 169, 97, 0.15);
  transition: all 0.5s ease;
  cursor: default;
  position: relative;
}
.pillar:last-child { border-right: none; padding-right: 0; }
.pillar:nth-child(n+2) { padding-left: 32px; }
.pillar:hover {
  background: rgba(201, 169, 97, 0.04);
}
.pillar-num {
  font-family: var(--italiana);
  font-size: 14px;
  color: var(--dorado);
  letter-spacing: 0.2em;
  margin-bottom: 24px;
}
.pillar-title {
  font-family: var(--italiana);
  font-size: 32px;
  color: var(--dorado);
  line-height: 1.1;
  margin-bottom: 20px;
}
.pillar-desc {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.7;
  color: rgba(244, 239, 230, 0.75);
  font-weight: 300;
}

/* ====== INGREDIENTES ====== */
.ingredientes {
  background: var(--crema);
  position: relative;
}
.ing-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  margin-bottom: 80px;
  align-items: end;
}
.ing-intro {
  font-family: var(--serif);
  font-size: 20px;
  line-height: 1.7;
  color: var(--tinta-suave);
  font-style: italic;
  max-width: 480px;
}

.ing-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid rgba(154, 127, 66, 0.3);
  border-left: 1px solid rgba(154, 127, 66, 0.3);
}
.ing-card {
  border-right: 1px solid rgba(154, 127, 66, 0.3);
  border-bottom: 1px solid rgba(154, 127, 66, 0.3);
  padding: 36px 28px 32px;
  background: var(--crema);
  transition: all 0.5s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
  min-height: 260px;
  display: flex;
  flex-direction: column;
}
.ing-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 0;
  background: var(--verde-bosque);
  transition: height 0.5s cubic-bezier(0.65, 0, 0.35, 1);
  z-index: 0;
}
.ing-card > * { position: relative; z-index: 1; }
.ing-card:hover::before { height: 100%; }
.ing-card:hover .ing-name,
.ing-card:hover .ing-desc,
.ing-card:hover .ing-glyph { color: var(--crema); }
.ing-card:hover .ing-num { color: var(--dorado); }

.ing-num {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--dorado-profundo);
  margin-bottom: 20px;
  transition: color 0.4s ease;
}
.ing-glyph {
  font-family: var(--italiana);
  font-size: 38px;
  color: var(--verde-oliva);
  margin-bottom: 16px;
  line-height: 1;
  transition: color 0.4s ease;
}
.ing-name {
  font-family: var(--italiana);
  font-size: 26px;
  color: var(--verde-bosque);
  margin-bottom: 12px;
  transition: color 0.4s ease;
}
.ing-desc {
  font-family: var(--sans);
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--tinta-suave);
  margin-top: auto;
  transition: color 0.4s ease;
}

.ing-badges {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 80px;
  padding-top: 60px;
  border-top: 1px solid rgba(154, 127, 66, 0.3);
  flex-wrap: wrap;
}
.ing-badge {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--verde-bosque);
  font-weight: 500;
}
.ing-badge svg {
  width: 22px;
  height: 22px;
  stroke: var(--dorado-profundo);
}

/* ====== PRODUCTOS ====== */
.productos {
  background: var(--verde-bosque);
  color: var(--crema);
  position: relative;
  overflow: hidden;
}
.productos .section-title { color: var(--crema); }
.productos .section-title em { color: var(--dorado); }
.productos .section-eyebrow { color: var(--dorado); }

.prod-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: end;
  margin-bottom: 80px;
}
.prod-intro {
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  line-height: 1.6;
  color: var(--crema);
  opacity: 0.85;
  max-width: 480px;
}

.prod-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.prod-card {
  background: var(--verde-profundo);
  border: 1px solid rgba(201, 169, 97, 0.2);
  padding: 36px 28px;
  cursor: pointer;
  transition: all 0.5s ease;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  min-height: 520px;
}
.prod-card:hover {
  border-color: var(--dorado);
  transform: translateY(-6px);
}
.prod-card:hover .prod-visual { transform: scale(1.05); }
.prod-card:hover .prod-wa { background: var(--dorado); color: var(--verde-profundo); }

.prod-visual {

  align-items: center;
  justify-content: center;

}
.prod-visual.shampoo {
  background-image: url('assets/producto-shampoo.jpeg?v=3');

}
.prod-visual.acond {
  background-image: url('assets/producto-acondicionador.jpeg?v=2');
  background-size: cover;
  background-position: center;
}
.prod-visual.oleo {
  background-image: url('assets/producto-oleo.jpeg?v=2');
  background-size: cover;
  background-position: center;
}
.prod-visual.tonico {
  background-image: url('assets/producto-tonico.jpeg?v=2');
  background-size: cover;

}

.prod-bottle {
  width: 45%;

  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 18%;
  box-shadow: inset -8px 0 20px rgba(0,0,0,0.3), inset 8px 0 12px rgba(255,255,255,0.05);
}
.prod-bottle::before {
  content: "";
  position: absolute;
  top: -14px;
  left: 22%;
  right: 22%;
  height: 22px;
  background: #0d1409;
  border-radius: 3px 3px 0 0;
}
.prod-bottle-logo {
  width: 36%;
  height: auto;
  filter: brightness(1.2);
  opacity: 0.9;
}

.prod-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--dorado);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.prod-name {
  font-family: var(--italiana);
  font-size: 28px;
  color: var(--crema);
  margin-bottom: 8px;
  line-height: 1;
}
.prod-desc {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14.5px;
  line-height: 1.5;
  color: rgba(244, 239, 230, 0.7);
  margin-bottom: 20px;
}
.prod-sizes {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.prod-size {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.2em;
  padding: 6px 12px;
  border: 1px solid rgba(201, 169, 97, 0.4);
  color: var(--dorado);
  border-radius: 2px;
}
.prod-wa {
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  border: 1px solid var(--dorado);
  color: var(--dorado);
  background: transparent;
  font-family: var(--sans);
  font-size: 10.5px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.35s ease;
  border-radius: 2px;
}

/* ====== RITUAL ====== */
.ritual {
  background: var(--crema-profunda);
  position: relative;
  overflow: hidden;
}
.ritual-inner {
  max-width: var(--container);
  margin: 0 auto;
}
.ritual-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  margin-top: 60px;
  position: relative;
}
.ritual-steps::before {
  content: "";
  position: absolute;
  top: 40px;
  left: 8%;
  right: 8%;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--dorado) 0 8px, transparent 8px 16px);
  opacity: 0.5;
}
.ritual-step {
  text-align: center;
  position: relative;
}
.ritual-num {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--crema);
  border: 1px solid var(--dorado);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--italiana);
  font-size: 32px;
  color: var(--dorado-profundo);
  margin: 0 auto 28px;
  position: relative;
  z-index: 2;
  transition: all 0.4s ease;
}
.ritual-step:hover .ritual-num {
  background: var(--verde-bosque);
  color: var(--dorado);
  transform: scale(1.08);
}
.ritual-step-title {
  font-family: var(--italiana);
  font-size: 26px;
  color: var(--verde-bosque);
  margin-bottom: 14px;
  line-height: 1.1;
}
.ritual-step-desc {
  font-family: var(--serif);
  font-size: 15px;
  line-height: 1.6;
  color: var(--tinta-suave);
  font-style: italic;
  max-width: 240px;
  margin: 0 auto;
}

/* ====== TESTIMONIOS ====== */
.testimonios {
  background: var(--crema);
  position: relative;
}
.testim-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  margin-top: 60px;
}
.testim {
  padding: 40px 36px;
  background: var(--crema-profunda);
  border-radius: 2px;
  position: relative;
  transition: all 0.5s ease;
  border: 1px solid transparent;
}
.testim:hover {
  background: var(--crema);
  border-color: var(--dorado);
  transform: translateY(-4px);
  box-shadow: 0 20px 40px var(--sombra);
}
.testim-quote {
  font-family: var(--italiana);
  font-size: 52px;
  color: var(--dorado);
  line-height: 0.5;
  margin-bottom: 20px;
  opacity: 0.8;
}
.testim-text {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.65;
  color: var(--tinta);
  margin-bottom: 28px;
  font-style: italic;
}
.testim-author {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-top: 20px;
  border-top: 1px solid rgba(154, 127, 66, 0.3);
}
.testim-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--verde-oliva);
  color: var(--dorado);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--italiana);
  font-size: 20px;
}
.testim-name {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--verde-bosque);
  letter-spacing: 0.05em;
}
.testim-city {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--tinta-suave);
  margin-top: 3px;
}

/* ====== CONTACTO ====== */
.contacto {
  background: var(--verde-profundo);
  color: var(--crema);
  position: relative;
  overflow: hidden;
}
.contacto::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 20% 80%, rgba(201, 169, 97, 0.08), transparent 55%);
  pointer-events: none;
}
.contacto-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 100px;
  align-items: center;
}
.contacto .section-title { color: var(--crema); }
.contacto .section-title em { color: var(--dorado); }
.contacto .section-eyebrow { color: var(--dorado); }
.contacto-lead {
  font-family: var(--serif);
  font-style: italic;
  font-size: 21px;
  line-height: 1.6;
  color: var(--crema);
  opacity: 0.85;
  margin: 32px 0 48px;
  max-width: 520px;
}

.contacto-actions {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 420px;
}
.contacto-action {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 22px 26px;
  border: 1px solid rgba(201, 169, 97, 0.3);
  background: rgba(201, 169, 97, 0.03);
  color: var(--crema);
  text-decoration: none;
  transition: all 0.4s ease;
  cursor: pointer;
}
.contacto-action:hover {
  border-color: var(--dorado);
  background: rgba(201, 169, 97, 0.1);
  transform: translateX(6px);
}
.contacto-action-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--dorado);
  color: var(--verde-profundo);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.contacto-action-label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--dorado);
  margin-bottom: 4px;
}
.contacto-action-value {
  font-family: var(--italiana);
  font-size: 22px;
  color: var(--crema);
  letter-spacing: 0.02em;
}

.contacto-visual {
  position: relative;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
}
.contacto-logo-big {
  width: 60%;
  height: auto;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
  animation: float 6s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}
.contacto-halo {
  position: absolute;
  width: 64%;
  aspect-ratio: 1;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 97, 0.2);
  animation: rotate 60s linear infinite;
}
.contacto-halo::before,
.contacto-halo::after {
  content: "✦";
  position: absolute;
  font-size: 14px;
  color: var(--dorado);
  opacity: 0.6;
}
.contacto-halo::before { top: -7px; left: 50%; }
.contacto-halo::after { bottom: -7px; left: 50%; }

/* ====== FOOTER ====== */
.footer {
  background: #131b10;
  color: rgba(244, 239, 230, 0.6);
  padding: 60px 40px 30px;
}
.footer-inner {
  max-width: var(--container);
  margin: 0 auto;
}
.footer-top {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 60px;
  padding-bottom: 48px;
  border-bottom: 1px solid rgba(201, 169, 97, 0.15);
}
.footer-brand {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.footer-brand img { width: 56px; height: 56px; border-radius: 50%; }
.footer-brand-name {
  font-family: var(--italiana);
  font-size: 28px;
  color: var(--dorado);
  letter-spacing: 0.1em;
}
.footer-brand-sub {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(244, 239, 230, 0.5);
  margin-top: 4px;
}
.footer-about {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  line-height: 1.6;
  max-width: 340px;
}
.footer-col-title {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--dorado);
  margin-bottom: 20px;
}
.footer-col a, .footer-col p {
  display: block;
  font-family: var(--serif);
  font-size: 16px;
  color: rgba(244, 239, 230, 0.75);
  text-decoration: none;
  margin-bottom: 10px;
  transition: color 0.3s ease;
}
.footer-col a:hover { color: var(--dorado); }
.footer-bottom {
  padding-top: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--sans);
  font-size: 10.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(244, 239, 230, 0.4);
  flex-wrap: wrap;
  gap: 16px;
}

/* Reveal on scroll */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Floating WhatsApp */
.wa-float {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--verde-bosque);
  color: var(--dorado);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  z-index: 90;
  text-decoration: none;
  transition: all 0.4s ease;
  border: 1px solid var(--dorado);
}
.wa-float:hover {
  transform: scale(1.08);
  background: var(--dorado);
  color: var(--verde-profundo);
}

/* ====== CARRITO ====== */
.nav-cart {
  position: relative;
  background: none;
  border: 1px solid var(--dorado);
  color: var(--dorado);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.35s ease;
  margin-left: 16px;
  flex-shrink: 0;
}
.nav.top .nav-cart { border-color: var(--crema); color: var(--crema); }
.nav-cart:hover { background: var(--dorado); color: var(--verde-profundo); }
.nav.top .nav-cart:hover { background: var(--crema); color: var(--verde-profundo); }
.nav-cart-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--dorado);
  color: var(--verde-profundo);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31, 45, 26, 0.6);
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  transition: all 0.4s ease;
}
.cart-overlay.open { opacity: 1; visibility: visible; }

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: 420px;
  max-width: 92vw;
  height: 100vh;
  background: var(--crema);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  display: flex;
  flex-direction: column;
  box-shadow: -10px 0 40px rgba(0,0,0,0.15);
}
.cart-drawer.open { transform: translateX(0); }

.cart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 28px;
  border-bottom: 1px solid var(--pergamino);
}
.cart-title {
  font-family: var(--italiana);
  font-size: 24px;
  color: var(--verde-bosque);
}
.cart-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--tinta-suave);
  padding: 4px;
  transition: color 0.3s;
}
.cart-close:hover { color: var(--tinta); }

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
}
.cart-empty {
  text-align: center;
  padding: 60px 20px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: var(--tinta-suave);
}

.cart-item {
  display: flex;
  gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--pergamino);
}
.cart-item-img {
  width: 72px;
  height: 90px;
  border-radius: 4px;
  background-size: cover;
  background-position: center;
  flex-shrink: 0;
}
.cart-item-info { flex: 1; }
.cart-item-name {
  font-family: var(--italiana);
  font-size: 18px;
  color: var(--verde-bosque);
  margin-bottom: 2px;
}
.cart-item-size {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--dorado-profundo);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cart-item-price {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--tinta);
  margin-bottom: 10px;
}
.cart-item-qty {
  display: flex;
  align-items: center;
  gap: 0;
}
.cart-item-qty button {
  width: 30px;
  height: 30px;
  border: 1px solid var(--pergamino);
  background: white;
  cursor: pointer;
  font-size: 16px;
  color: var(--tinta);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.cart-item-qty button:hover { background: var(--pergamino); }
.cart-item-qty span {
  width: 36px;
  height: 30px;
  border-top: 1px solid var(--pergamino);
  border-bottom: 1px solid var(--pergamino);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
}
.cart-item-remove {
  background: none;
  border: none;
  color: var(--tinta-suave);
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  opacity: 0.6;
  transition: opacity 0.2s;
}
.cart-item-remove:hover { opacity: 1; }

.cart-footer {
  padding: 24px 28px;
  border-top: 1px solid var(--pergamino);
}
.cart-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.cart-total-label {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tinta-suave);
}
.cart-total-price {
  font-family: var(--italiana);
  font-size: 28px;
  color: var(--verde-bosque);
}
.cart-wa-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px;
  background: var(--verde-bosque);
  color: var(--dorado);
  border: none;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.35s;
  text-decoration: none;
  border-radius: 2px;
}
.cart-wa-btn:hover { background: var(--dorado); color: var(--verde-profundo); }

.prod-price {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 500;
  color: var(--dorado);
  margin-bottom: 12px;
}
.prod-sizes-select {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.prod-size-btn {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.2em;
  padding: 6px 12px;
  border: 1px solid rgba(201, 169, 97, 0.4);
  color: var(--dorado);
  border-radius: 2px;
  background: transparent;
  cursor: pointer;
  transition: all 0.3s;
}
.prod-size-btn:hover { border-color: var(--dorado); }
.prod-size-btn.active {
  background: var(--dorado);
  color: var(--verde-profundo);
  border-color: var(--dorado);
}
.prod-add-cart {
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  border: 1px solid var(--dorado);
  color: var(--dorado);
  background: transparent;
  font-family: var(--sans);
  font-size: 10.5px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.35s ease;
  border-radius: 2px;
  width: 100%;
}
.prod-add-cart:hover { background: var(--dorado); color: var(--verde-profundo); }
.prod-add-cart.added {
  background: var(--dorado);
  color: var(--verde-profundo);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 0;
}

.cart-form {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
}
.cart-form-title {
  font-family: var(--italiana);
  font-size: 20px;
  color: var(--verde-bosque);
  margin-bottom: 20px;
}
.cart-form-group {
  margin-bottom: 16px;
}
.cart-form-label {
  display: block;
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--tinta-suave);
  margin-bottom: 6px;
}
.cart-form-input,
.cart-form-textarea,
.cart-form-select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--pergamino);
  background: white;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--tinta);
  border-radius: 2px;
  transition: border-color 0.3s;
  outline: none;
}
.cart-form-input:focus,
.cart-form-textarea:focus,
.cart-form-select:focus {

}
.cart-form-textarea {
  resize: vertical;

}
.cart-form-row {

  grid-template-columns: 1fr 1fr;

}
.cart-form-summary {

  padding: 16px;
  border-radius: 4px;
  margin-bottom: 20px;
}
.cart-form-summary-item {
  display: flex;
  justify-content: space-between;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--tinta-suave);
  padding: 4px 0;
}
.cart-form-summary-total {

  justify-content: space-between;
  font-family: var(--sans);
  font-size: 14px;

const CartContext = React.createContext();

function CartProvider({ children }) {
  const [items, setItems] = React.useState([]);
  const [open, setOpen] = React.useState(false);

  const addItem = (product) => {
    setItems(prev => {
      const key = product.key + "-" + product.selectedSize;
      const existing = prev.find(i => i.cartKey === key);
      if (existing) {
        return prev.map(i => i.cartKey === key ? { ...i, qty: i.qty + 1 } : i);
      }
      return [...prev, { ...product, cartKey: key, qty: 1 }];
    });
    setOpen(true);
  };

  const updateQty = (cartKey, delta) => {
    setItems(prev => prev.map(i => {
      if (i.cartKey !== cartKey) return i;
      const newQty = i.qty + delta;
      return newQty > 0 ? { ...i, qty: newQty } : i;
    }));
  };

  const removeItem = (cartKey) => {
    setItems(prev => prev.filter(i => i.cartKey !== cartKey));
  };

  const totalItems = items.reduce((sum, i) => sum + i.qty, 0);
  const totalPrice = items.reduce((sum, i) => sum + i.price * i.qty, 0);

  return (
    <CartContext.Provider value={{ items, open, setOpen, addItem, updateQty, removeItem, totalItems, totalPrice }}>
      {children}
    </CartContext.Provider>
  );
}

function ProductCard({ p, i }) {
  const { addItem } = React.useContext(CartContext);
  const [selectedSize, setSelectedSize] = React.useState(0);
  const [added, setAdded] = React.useState(false);

  const handleAdd = () => {
    const size = p.sizes[selectedSize];
    addItem({
      key: p.key,
      name: p.name,
      selectedSize: size.label,
      price: size.price,
    });
    setAdded(true);
    setTimeout(() => setAdded(false), 1200);
  };

  return (
    <div className="prod-card reveal" style={{ transitionDelay: `${i * 80}ms` }}>
      <div className={`prod-visual ${p.visualClass}`} />
      <div className="prod-label">{p.label}</div>
      <h3 className="prod-name">{p.name}</h3>
      <p className="prod-desc">{p.desc}</p>
      <div className="prod-price">S/ {p.sizes[selectedSize].price.toFixed(2)}</div>
      <div className="prod-sizes-select">
        {p.sizes.map((s, si) => (
          <button
            key={s.label}
            className={`prod-size-btn ${si === selectedSize ? "active" : ""}`}
            onClick={() => setSelectedSize(si)}
          >
            {s.label}
          </button>
        ))}
      </div>
      <button className={`prod-add-cart ${added ? "added" : ""}`} onClick={handleAdd}>
        {added ? (
          <React.Fragment><Icons.Check size={14} /> Agregado</React.Fragment>
        ) : (
          <React.Fragment><Icons.Cart size={14} /> Agregar al carrito</React.Fragment>
        )}
      </button>
    </div>
  );
}

function App() {
  React.useEffect(() => {
    // Reveal-on-scroll observer
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.12, rootMargin: "0px 0px -60px 0px" }
    );
    document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  return (
    <CartProvider>
      <Nav />
      <Hero />
      <Marquee />
      <Productos />
      <Historia />
      <Filosofia />
      <Ingredientes />
      <Ritual />
      <Testimonios />
      <Contacto />
      <Footer />
      <CartDrawer />

      <a
        className="wa-float"
        href="https://wa.me/51980583248?text=Hola%20Ra%C3%ADz%20Viva%2C%20quiero%20hacer%20un%20pedido."
        target="_blank"
        rel="noopener"
        aria-label="WhatsApp"
      >
        <Icons.WhatsApp size={26} />
      </a>
    </CartProvider>
  );
}
